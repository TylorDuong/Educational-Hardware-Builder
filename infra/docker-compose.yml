name: educational-hardware-builder

services:
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://hardware_builder:hardware_builder_dev@postgres:5432/hardware_builder
      # Set WEB_OLLAMA_URL=http://host.docker.internal:11434 to use a native
      # Windows Ollama installation (for example, an AMD GPU via Vulkan).
      OLLAMA_URL: ${WEB_OLLAMA_URL:-http://ollama:11434}
      DEMO_SAFE_MODE: ${DEMO_SAFE_MODE:-false}
      INGEST_API_TOKEN: ${INGEST_API_TOKEN:-local-dev-ingest-token}
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: hardware_builder
      POSTGRES_USER: hardware_builder
      POSTGRES_PASSWORD: hardware_builder_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  migrate:
    image: postgres:16-alpine
    restart: "no"
    environment:
      PGPASSWORD: hardware_builder_dev
    volumes:
      - ./postgres/migrations:/migrations:ro
    command:
      - /bin/sh
      - -ec
      - |
        for migration in /migrations/*.sql; do
          psql -h postgres -U hardware_builder -d hardware_builder -v ON_ERROR_STOP=1 -f "$${migration}"
        done
    depends_on:
      postgres:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  model-init:
    image: ollama/ollama:latest
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - /bin/sh
      - -ec
      - |
        ollama pull llama3.2:3b
        ollama pull llama3.1:8b
        ollama pull qwen2.5-coder:7b
        ollama pull nomic-embed-text

  n8n:
    image: n8nio/n8n:1.112.0
    restart: unless-stopped
    environment:
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-local-dev-n8n-encryption-key-change-me}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_RUNNERS_ENABLED: "true"
      INGEST_API_URL: http://web:3000/api/ingest/v2/upsert
      INGEST_API_TOKEN: ${INGEST_API_TOKEN:-local-dev-ingest-token}
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      web:
        condition: service_started

  openscad:
    build:
      context: ./openscad
    restart: unless-stopped
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  postgres-data:
  ollama-data:
  n8n-data:
